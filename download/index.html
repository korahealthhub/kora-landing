<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit;border:none;outline:none}

body{
  font-family:'Manrope',system-ui,sans-serif;
  background:#07161B;
  color:#F5F0E6;
  -webkit-font-smoothing:antialiased;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:24px;
}

/* ─── Logo ───────────────────────────────────── */
.logo{
  height:28px;
  object-fit:contain;
  filter:brightness(0) invert(1);
  opacity:.88;
  margin-bottom:40px;
}

/* ─── Spinner ────────────────────────────────── */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{
  width:36px;height:36px;
  border:3px solid rgba(93,202,165,0.18);
  border-top-color:#5DCAA5;
  border-radius:50%;
  animation:spin .8s linear infinite;
  margin-bottom:20px;
}

/* ─── Status text ────────────────────────────── */
.status{
  font-size:15px;
  font-weight:600;
  color:rgba(245,240,230,0.55);
  letter-spacing:.02em;
  margin-bottom:52px;
}

/* ─── Fallback buttons ───────────────────────── */
.fallback{
  display:flex;
  flex-direction:column;
  gap:10px;
  width:100%;
  max-width:320px;
}
.fallback-label{
  font-size:11px;
  font-weight:600;
  color:rgba(245,240,230,0.22);
  text-align:center;
  letter-spacing:.06em;
  text-transform:uppercase;
  margin-bottom:4px;
}
.dl-btn{
  display:flex;
  align-items:center;
  gap:14px;
  padding:14px 18px;
  border-radius:14px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  color:#F5F0E6;
  transition:background .18s,border-color .18s,transform .18s;
  cursor:pointer;
}
.dl-btn:hover{
  background:rgba(93,202,165,0.09);
  border-color:rgba(93,202,165,0.25);
  transform:translateY(-1px);
}
.dl-btn-icon{
  display:flex;align-items:center;justify-content:center;
  width:36px;height:36px;border-radius:10px;
  background:rgba(93,202,165,0.12);
  color:#5DCAA5;
  flex-shrink:0;
}
.dl-btn-body{display:flex;flex-direction:column;gap:2px}
.dl-btn-label{font-size:14px;font-weight:700;color:#F5F0E6}
.dl-btn-caption{font-size:12px;color:rgba(245,240,230,0.45)}

<script>
  var ua = navigator.userAgent || '';
  var isIOS     = /iPhone|iPad|iPod/i.test(ua);
  var isAndroid = /Android/i.test(ua);

  var destination = isIOS
    ? 'https://apps.apple.com/br/app/kora-health-hub/id6769632514'
    : isAndroid
    ? '/android/'
    : '/';

  var eventLabel = isIOS
    ? 'app_store_ios'
    : isAndroid
    ? 'google_play_android'
    : 'desktop';

  gtag('event', 'smart_link_redirect', {
    'event_category': 'conversion',
    'event_label': eventLabel
  });

  ttq.track('ClickButton', {
    contents: [{
      content_id: eventLabel,
      content_type: 'app',
      content_name: 'Kora Smart Link - ' + eventLabel
    }]
  });

  setTimeout(function() {
    window.location.href = destination;
  }, 500);
</script>
