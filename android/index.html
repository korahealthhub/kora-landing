<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kora | Teste Android</title>
<meta name="description" content="Solicite acesso ao teste fechado do Kora no Android.">
<link rel="icon" href="../logo-k.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
img,svg{display:block}
a{color:inherit;text-decoration:none}
button,input{font-family:inherit;border:none;outline:none}
button{cursor:pointer}

:root{
  --bg:         #0A1A18;
  --teal:       #3D9E8C;
  --teal-l:     #52C5B0;
  --text:       #F5F0E6;
  --text-dim:   rgba(245,240,230,0.52);
  --text-faint: rgba(245,240,230,0.22);
  --border:     rgba(61,158,140,0.12);
  --px:         80px;
}
@media(max-width:768px){:root{--px:22px}}

body{
  font-family:'Manrope',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ─── Nav ─────────────────────────────────────────────── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:60px;padding:0 var(--px);
  display:flex;align-items:center;justify-content:space-between;
  transition:background .4s,border-color .4s;
  border-bottom:1px solid transparent;
}
nav.scrolled{
  background:rgba(10,26,24,0.92);
  border-bottom-color:var(--border);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
}
.nav-brand img{
  height:28px;object-fit:contain;
  filter:brightness(0) invert(1);
  opacity:.9;
}
.nav-back{
  display:inline-flex;align-items:center;gap:7px;
  font-size:13px;font-weight:600;
  color:rgba(245,240,230,0.55);
  transition:color .2s;
}
.nav-back:hover{color:var(--text)}
.nav-back svg{flex-shrink:0}

/* ─── Main ────────────────────────────────────────────── */
main{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:100px var(--px) 60px;
}

.card{
  width:100%;
  max-width:420px;
  display:flex;
  flex-direction:column;
  gap:28px;
}

/* ─── Icon badge ──────────────────────────────────────── */
.icon-badge{
  width:56px;height:56px;border-radius:16px;
  background:linear-gradient(135deg,rgba(61,158,140,0.18),rgba(61,158,140,0.06));
  border:1px solid rgba(61,158,140,0.22);
  display:flex;align-items:center;justify-content:center;
  color:var(--teal-l);
}

/* ─── Headlines ───────────────────────────────────────── */
.card-head{display:flex;flex-direction:column;gap:10px}
h1{
  font-size:clamp(24px,5vw,32px);
  font-weight:800;
  line-height:1.2;
  color:var(--text);
}
.sub{
  font-size:15px;
  font-weight:400;
  color:var(--text-dim);
  line-height:1.6;
}

/* ─── Form ────────────────────────────────────────────── */
.form{display:flex;flex-direction:column;gap:12px}

.field{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:12px;
  padding:14px 16px;
  font-size:15px;
  color:var(--text);
  width:100%;
  transition:border-color .2s,background .2s;
}
.field::placeholder{color:rgba(245,240,230,0.3)}
.field:focus{
  border-color:rgba(61,158,140,0.5);
  background:rgba(61,158,140,0.04);
  outline:none;
}

.submit-btn{
  margin-top:4px;
  padding:15px;
  border-radius:12px;
  background:linear-gradient(135deg,#3DAA85,#5DCAA5);
  color:#fff;
  font-family:'Manrope',sans-serif;
  font-size:15px;
  font-weight:700;
  letter-spacing:.02em;
  border:none;
  cursor:pointer;
  transition:box-shadow .2s,transform .18s;
  box-shadow:0 6px 20px rgba(61,170,133,0.28);
}
.submit-btn:hover{
  box-shadow:0 10px 28px rgba(61,170,133,0.38);
  transform:translateY(-1px);
}
.submit-btn:disabled{
  opacity:.55;cursor:not-allowed;transform:none;
}

/* ─── Sucesso ─────────────────────────────────────────── */
.success{
  display:none;
  flex-direction:column;
  align-items:center;
  gap:16px;
  text-align:center;
  padding:32px 0;
}
.success.visible{display:flex}
.success-icon{
  width:56px;height:56px;border-radius:50%;
  border:1.5px solid var(--teal);
  display:flex;align-items:center;justify-content:center;
}
.success-title{
  font-size:20px;font-weight:800;
  color:var(--text);
}
.success-body{
  font-size:14px;font-weight:400;
  color:var(--text-dim);
  line-height:1.6;
}

/* ─── Footer ──────────────────────────────────────────── */
footer{
  border-top:1px solid var(--border);
  padding:24px var(--px);
  display:flex;align-items:center;justify-content:center;
  gap:6px;
  font-size:12px;
  color:var(--text-faint);
}
footer a{color:var(--text-faint);transition:color .2s}
footer a:hover{color:var(--text-dim)}
</style>
</head>
<body>

<nav id="nav">
  <div class="nav-brand">
    <img src="../nome-kora.png" alt="Kora">
  </div>
  <a href="/" class="nav-back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Voltar ao site
  </a>
</nav>

<main>
  <div class="card">

    <div class="icon-badge">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3.18 23.76c.3.17.65.19.97.07l11.65-6.74-2.5-2.5-10.12 9.17zm-1.12-20.3A1.5 1.5 0 0 0 2 4.5v15a1.5 1.5 0 0 0 .06.54l10.44-9.54L2.06 3.46zM20.1 9.24l-2.5-1.44-2.8 2.56 2.8 2.8 2.52-1.46a1.5 1.5 0 0 0 0-2.46zM4.15.24a1 1 0 0 0-.97.07L13.3 9.58l2.5-2.5L4.15.24z"/>
      </svg>
    </div>

    <div class="card-head">
      <h1>Teste o Kora<br>no Android</h1>
      <p class="sub">Estamos em fase de teste fechado no Google Play. Deixe seu e-mail e entraremos em contato com o link de download.</p>
    </div>

    <form class="form" id="android-form">
      <input class="field" type="text" id="f-name" name="name" placeholder="Seu nome (opcional)" autocomplete="name">
      <input class="field" type="email" id="f-email" name="email" placeholder="seu@email.com" required autocomplete="email">
      <button class="submit-btn" type="submit" id="submit-btn">Quero testar</button>
    </form>

    <div class="success" id="success-msg">
      <div class="success-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#3D9E8C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <p class="success-title">Recebemos seu e-mail!</p>
      <p class="success-body">Entraremos em contato em breve<br>com o link de acesso ao teste.</p>
    </div>

  </div>
</main>

<footer>
  <span>© 2026 Kora Health Hub</span>
  <span>·</span>
  <a href="/privacidade">Privacidade</a>
</footer>

<script>
const nav = document.getElementById('nav');
window.addEventListener('scroll', () => {
  nav.classList.toggle('scrolled', window.scrollY > 40);
}, {passive: true});

const form = document.getElementById('android-form');
const btn  = document.getElementById('submit-btn');
const ok   = document.getElementById('success-msg');

form.addEventListener('submit', e => {
  e.preventDefault();
  const email = document.getElementById('f-email').value.trim();
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    document.getElementById('f-email').focus();
    return;
  }
  form.style.opacity = '0';
  form.style.transition = 'opacity 0.35s ease';
  setTimeout(() => {
    form.style.display = 'none';
    ok.classList.add('visible');
  }, 350);
});
</script>

</body>
</html>
